<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago - Supermercado RB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Estilos/styles.css">
</head>
<body class="bg-light">

    <!-- HEADER SIMPLIFICADO -->
    <header class="bg-white border-bottom py-3 mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-decoration-none">
                <!-- Cambiado text-success por text-danger (Rojo Vivo) -->
                <h1 class="fw-bold text-danger m-0">Supermercado <span class="text-dark">RB</span></h1>
            </a>
            <!-- Cambiado btn-outline-secondary por btn-outline-dark para evitar tonos azules/celestes y dar más contraste -->
            <a href="index.html" class="btn btn-outline-dark btn-sm fw-semibold">← Volver a la tienda</a>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row g-5">
            
            <!-- COLUMNA IZQUIERDA: FORMULARIO DE CLIENTE -->
            <div class="col-lg-7">
                <div class="card p-4 shadow-sm border-0" style="border-radius: 12px;">
                    <h3 class="fw-bold mb-4">Datos de Facturación y Envío</h3>
                    
                    <form id="form-pasarela-pago">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold">Nombre Completo</label>
                                <input type="text" class="form-control" id="pago-nombre" required placeholder="Juan Pérez">
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label small fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="pago-correo" required placeholder="juan@ejemplo.com">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Tipo de Comprobante</label>
                                <select class="form-select" id="pago-tipo-doc" required>
                                    <option value="DNI" selected>Boleta (DNI)</option>
                                    <option value="RUC">Factura (RUC)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold" id="label-documento">Número de DNI</label>
                                <input type="text" class="form-control" id="pago-documento" required placeholder="Escribe tus 8 dígitos">
                            </div>

                            <div class="col-12">
                                <label class="form-label small fw-semibold">Dirección de Entrega</label>
                                <input type="text" class="form-control" id="pago-direccion" required placeholder="Av. Larco 123, Miraflores">
                            </div>
                        </div>

                        <hr class="my-4">
                        <h4 class="fw-bold mb-3">Método de Pago Simulado</h4>
                        
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small fw-semibold">Número de Tarjeta</label>
                                <input type="text" class="form-control" id="pago-tarjeta" required placeholder="4111 2222 3333 4444" maxlength="16">
                            </div>
                        </div>

                        <!-- Botón principal cambiado a btn-danger (Rojo definitivo) -->
                        <button type="submit" class="btn btn-danger w-100 py-3 fw-bold mt-4" style="border-radius: 8px; letter-spacing: 0.5px;">
                            Confirmar y Pagar S/ <span id="total-boton-pago">0.00</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- COLUMNA DERECHA: RESUMEN DEL PEDIDO -->
            <div class="col-lg-5">
                <div class="card p-4 shadow-sm border-0 text-bg-dark" style="border-radius: 12px;">
                    <h4 class="fw-bold mb-4">Resumen de tu compra</h4>
                    
                    <div id="resumen-productos-pago" class="mb-4" style="max-height: 250px; overflow-y: auto;">
                        <!-- JS inyectará los productos aquí -->
                    </div>

                    <hr class="border-secondary">

                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-secondary">Subtotal</span>
                        <span id="subtotal-pago">S/ 0.00</span>
                    </div>
                    <!-- Cambiado text-success por text-danger para que el total resalte en rojo vivo dentro de la tarjeta oscura -->
                    <div class="d-flex justify-content-between mb-4 fs-5 fw-bold text-danger">
                        <span>Total a Pagar</span>
                        <span id="total-pago">S/ 0.00</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/pago.js"></script>

</body>
</html>
