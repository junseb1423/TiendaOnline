<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Supermercado RB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Estilos/styles.css">

</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 15px;">
        <!-- Logo o Nombre del Proyecto -->
        <div class="text-center mb-4">
            <!-- Cambiado a text-danger para el rojo vivo -->
            <h1 class="fw-bold text-danger m-0">Supermercado <span class="text-dark">RB</span></h1>
            <p class="text-muted small">Tu mercado de confianza</p>
        </div>

        <!-- Selector de Pestañas (Tabs) de Bootstrap -->
        <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <!-- Se eliminó text-success para que use nuestro estilo rojo personalizado -->
                <button class="nav-link active rounded fw-semibold" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-panel" type="button" role="tab">
                    Ingresar
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded fw-semibold text-muted" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-panel" type="button" role="tab">
                    Registrarse
                </button>
            </li>
        </ul>

        <!-- Contenido de los Formularios -->
        <div class="tab-content" id="authTabsContent">
            
            <!-- FORMULARIO 1: INICIAR SESIÓN -->
            <div class="tab-pane fade show active" id="login-panel" role="tabpanel">
                <form id="form-login">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Correo Electrónico</label>
                        <input type="email" class="form-control" id="login-email" required placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="login-pass" required placeholder="••••••••">
                    </div>
                    <!-- Cambiado de btn-success a btn-danger para un botón rojo vivo y llamativo -->
                    <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold" style="border-radius: 8px;">Iniciar Sesión</button>
                </form>
            </div>

            <!-- FORMULARIO 2: REGISTRO DE USUARIO -->
            <div class="tab-pane fade" id="register-panel" role="tabpanel">
                <form id="form-registro">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Nombre Completo</label>
                        <input type="text" class="form-control" id="reg-nombre" required placeholder="Juan Pérez">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Correo Electrónico</label>
                        <input type="email" class="form-control" id="reg-email" required placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="reg-pass" required placeholder="Crea una contraseña segura">
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="reg-terminos" required>
                        <label class="form-check-label small text-muted" for="reg-terminos">
                            Acepto los términos y condiciones de Supermercado RB
                        </label>
                    </div>
                    <!-- Botón oscuro formal de registro conservado tal como lo tenías -->
                    <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold" style="border-radius: 8px;">Crear mi Cuenta</button>
                </form>
            </div>

        </div>
    </div>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tu JavaScript para manejar la lógica -->
    <script src="/js/login.js"></script>
</body>
</html>
