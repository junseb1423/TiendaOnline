<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RB Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Estilos/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <!-- Logo o Título principal -->
                <div class="text-center mb-4">
                    <h2 class="fw-black text-dark tracking-tight m-0">RB <span class="text-success">Market</span></h2>
                    <p class="text-muted small">Tu supermercado de confianza</p>
                </div>

                <!-- Tarjeta del Formulario -->
                <div class="card login-card p-4">
                    <h3 class="fs-4 fw-bold text-dark text-center mb-4">Ingresa a tu cuenta</h3>
                    
                    <!-- Contenedor para mostrar alertas de error si ponen mal la clave -->
                    <div id="alerta-login" class="alert alert-danger d-none" role="alert"></div>

                    <form id="formulario-login">
                        <!-- Correo Electrónico -->
                        <div class="mb-3">
                            <label for="correo" class="form-label text-muted small fw-semibold">Correo Electrónico</label>
                            <input type="email" id="correo" class="form-control rounded-3" placeholder="ejemplo@rb.com" style="height: 45px;" required>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-4">
                            <label for="clave" class="form-label text-muted small fw-semibold">Contraseña</label>
                            <input type="password" id="clave" class="form-control rounded-3" placeholder="••••••••" style="height: 45px;" required>
                        </div>

                        <!-- Botón Ingresar -->
                        <button type="submit" class="btn btn-success w-100 rounded-3 fw-bold fs-5 mb-3" style="height: 45px;">
                            Ingresar
                        </button>
                        
                        <!-- Volver a la tienda -->
                        <div class="text-center">
                            <a href="index.html" class="text-success text-decoration-none small fw-bold">← Volver a la tienda</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
